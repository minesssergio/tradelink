name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install order matters: services/api depends on services/schwab via a
      # "file:../schwab" reference, so schwab's own node_modules must exist
      # first for TypeScript to resolve its nested imports.
      - name: Install schwab service
        working-directory: services/schwab
        run: npm ci

      - name: Typecheck schwab service
        working-directory: services/schwab
        run: npx tsc --noEmit

      - name: Install API gateway
        working-directory: services/api
        run: npm ci

      - name: Typecheck API gateway
        working-directory: services/api
        run: npx tsc --noEmit

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
